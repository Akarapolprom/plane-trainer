<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Rotation Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Sarabun:wght@300;400;500&display=swap');

  :root {
    --bg: #0b0f1a;
    --card: #161f30;
    --border: #1e2d42;
    --accent: #38bdf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --red: #f87171;
    --blue: #60a5fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 36px; gap: 16px;
    background-image: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(56,189,248,0.06) 0%, transparent 70%);
  }

  /* HEADER */
  .hdr { text-align:center; }
  .hdr h1 { font-family:'Chakra Petch',monospace; font-size:18px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#fff; }
  .hdr h1 span { color:var(--accent); }
  .hdr p { font-size:12px; color:var(--muted); margin-top:3px; }

  /* TOP ROW: START | STEPS | RESULT */
  .top-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 960px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
  }

  /* START & RESULT big planes */
  .endpoint {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .ep-canvas-wrap {
    border-radius: 14px; border: 2px solid;
    background: #0d1520; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .ep-canvas-wrap.start-ep { border-color: var(--green); }
  .ep-canvas-wrap.result-ep { border-color: var(--yellow); box-shadow: 0 0 18px rgba(251,191,36,0.2); }
  .ep-lbl {
    font-family: 'Chakra Petch', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .ep-lbl.start-ep { color: var(--green); }
  .ep-lbl.result-ep { color: var(--yellow); }

  /* STEPS MIDDLE AREA */
  .steps-middle {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px;
    min-width: 0;
  }

  /* small step row: badges + mini planes */
  .steps-scroll {
    display: flex; align-items: center; gap: 0;
    overflow-x: auto; width: 100%; padding-bottom: 4px;
  }
  .steps-scroll::-webkit-scrollbar { height: 3px; }
  .steps-scroll::-webkit-scrollbar-track { background: transparent; }
  .steps-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .mini-item { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
  .mini-wrap {
    width: 52px; height: 52px; background: #0d1520;
    border-radius: 8px; border: 1.5px solid var(--border);
    overflow: hidden; display:flex; align-items:center; justify-content:center;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .mini-wrap:hover { border-color: var(--accent); }
  .mini-wrap.hl { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
  .mini-lbl { font-family:'Chakra Petch',monospace; font-size:9px; color:var(--muted); letter-spacing:0.5px; }

  .conn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:0 4px; flex-shrink:0; margin-bottom:16px; }
  .conn-badge {
    font-family:'Chakra Petch',monospace; font-size:11px; font-weight:700;
    padding:3px 10px; border-radius:7px; border:1.5px solid; cursor:pointer;
    white-space:nowrap; letter-spacing:0.5px; transition: all 0.15s;
  }
  .conn-badge.R { color:var(--red); border-color:var(--red); background:rgba(248,113,113,0.08); }
  .conn-badge.R:hover, .conn-badge.R.hl { background:rgba(248,113,113,0.25); }
  .conn-badge.L { color:var(--blue); border-color:var(--blue); background:rgba(96,165,250,0.08); }
  .conn-badge.L:hover, .conn-badge.L.hl { background:rgba(96,165,250,0.25); }
  .conn-arrow { color:var(--muted); font-size:12px; }

  /* DELETE badge button */
  .del-btn {
    font-size:9px; color:var(--muted); border:none; background:transparent;
    cursor:pointer; padding:1px 4px; border-radius:4px; transition:color 0.1s;
  }
  .del-btn:hover { color:var(--red); }

  /* INFO BAR */
  .info-bar {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    width: 100%;
  }
  .info-chip {
    font-family:'Chakra Petch',monospace; font-size:11px;
    padding:4px 12px; border-radius:7px; border:1px solid var(--border);
    background:var(--bg); color:var(--muted);
  }
  .info-chip b { color:#fff; }
  .info-chip.hi { border-color: var(--yellow); }
  .info-chip.hi b { color: var(--yellow); }

  /* CONTROLS */
  .ctrl-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 22px;
    width: 100%; max-width: 960px; display:flex; flex-direction:column; gap:12px;
  }
  .ctrl-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .sec-lbl {
    font-family:'Chakra Petch',monospace; font-size:10px; letter-spacing:2px;
    color:var(--accent); text-transform:uppercase; width:100%; margin-bottom:-4px;
  }
  .deg-wrap {
    display:flex; align-items:center; gap:5px; background:var(--bg);
    border-radius:9px; border:1px solid var(--border); padding:5px 11px;
  }
  .deg-wrap input {
    font-family:'Chakra Petch',monospace; font-size:17px; font-weight:700;
    width:65px; border:none; background:transparent; color:#fff; outline:none;
  }
  .deg-wrap span { font-size:12px; color:var(--muted); }
  .btn {
    font-family:'Chakra Petch',monospace; font-size:13px; font-weight:700;
    padding:9px 18px; border-radius:9px; border:2px solid; cursor:pointer;
    transition:all 0.15s; letter-spacing:1px;
  }
  .btn:active { transform:scale(0.95); }
  .btn-R { color:var(--red); border-color:var(--red); background:rgba(248,113,113,0.08); }
  .btn-R:hover { background:rgba(248,113,113,0.22); box-shadow:0 0 12px rgba(248,113,113,0.3); }
  .btn-L { color:var(--blue); border-color:var(--blue); background:rgba(96,165,250,0.08); }
  .btn-L:hover { background:rgba(96,165,250,0.22); box-shadow:0 0 12px rgba(96,165,250,0.3); }
  .btn-play { color:var(--green); border-color:var(--green); background:rgba(52,211,153,0.08); }
  .btn-play:hover { background:rgba(52,211,153,0.18); }
  .btn-rst { color:var(--muted); border-color:var(--border); background:var(--bg); font-size:11px; padding:7px 14px; }
  .btn-rst:hover { border-color:var(--red); color:var(--red); }

  .preset-row { display:flex; gap:7px; flex-wrap:wrap; }
  .pb {
    font-family:'Chakra Petch',monospace; font-size:10px; font-weight:600;
    padding:6px 12px; border-radius:7px; border:1px solid var(--border);
    background:var(--bg); color:var(--muted); cursor:pointer; transition:all 0.15s;
    letter-spacing:0.5px;
  }
  .pb:hover { border-color:var(--accent); color:var(--accent); }

  /* NO STEPS HINT */
  .empty-hint {
    font-family:'Chakra Petch',monospace; font-size:12px; color:var(--muted);
    text-align:center; padding: 8px 0;
  }
</style>
</head>
<body>

<div class="hdr">
  <h1>✈ Plane <span>Roll</span> Explorer</h1>
  <p>มุมมองจากด้านบน · ปีกแดง = ขวาเครื่อง · ปีกน้ำเงิน = ซ้ายเครื่อง · 🟡 = หัวเครื่อง</p>
</div>

<!-- TOP ROW -->
<div class="top-row" id="topRow">
  <!-- rendered by JS -->
</div>

<!-- CONTROLS -->
<div class="ctrl-card">
  <div class="sec-lbl">// เพิ่ม Step</div>
  <div class="ctrl-row">
    <div class="deg-wrap">
      <input id="degIn" type="number" value="90" min="1" max="720" />
      <span>°</span>
    </div>
    <button class="btn btn-R" onclick="addStep('R')">+ R</button>
    <button class="btn btn-L" onclick="addStep('L')">+ L</button>
    <button class="btn btn-play" onclick="playAnim()">▶ Play</button>
    <button class="btn btn-rst" onclick="resetAll()">✕ Reset</button>
  </div>
  <div class="sec-lbl">// Presets</div>
  <div class="preset-row">
    <button class="pb" onclick="loadPreset([[585,'R'],[360,'L'],[675,'R'],[315,'R'],[720,'R']])">585R 360L 675R 315R 720R</button>
    <button class="pb" onclick="loadPreset([[90,'R'],[90,'R'],[90,'R'],[90,'R']])">90R × 4</button>
    <button class="pb" onclick="loadPreset([[180,'R'],[360,'L'],[270,'R']])">180R 360L 270R</button>
    <button class="pb" onclick="loadPreset([[45,'R'],[45,'R'],[90,'L']])">45R 45R 90L</button>
    <button class="pb" onclick="loadPreset([[270,'L'],[90,'R'],[180,'L']])">270L 90R 180L</button>
  </div>
</div>

<script>
// ── STATE ──
let steps = [];
let highlighted = null;
let animId = null;

// ── ANGLES ──
function getAngles() {
  const a = [0];
  for (const s of steps) a.push(a[a.length-1] + (s.dir==='R' ? s.deg : -s.deg));
  return a;
}

// ── DRAW PLANE (top-down, nose up) ──
function drawPlane(canvas, rollDeg) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  ctx.clearRect(0,0,W,H);

  // grid bg
  ctx.strokeStyle = 'rgba(30,45,66,0.7)'; ctx.lineWidth=1;
  const g=14;
  for(let x=0;x<=W;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // crosshair
  ctx.strokeStyle='rgba(56,189,248,0.12)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
  ctx.setLineDash([]);

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rollDeg * Math.PI/180);
  drawPlaneShape(ctx, W);
  ctx.restore();
}

function drawPlaneShape(ctx, W) {
  const u = W / 140;

  // fuselage
  ctx.beginPath();
  ctx.moveTo(0,-52*u);
  ctx.bezierCurveTo(6*u,-46*u, 8*u,-32*u, 8*u,-18*u);
  ctx.lineTo(7*u, 14*u);
  ctx.bezierCurveTo(7*u,38*u, 3.5*u,50*u, 0,54*u);
  ctx.bezierCurveTo(-3.5*u,50*u,-7*u,38*u,-7*u,14*u);
  ctx.lineTo(-8*u,-18*u);
  ctx.bezierCurveTo(-8*u,-32*u,-6*u,-46*u,0,-52*u);
  ctx.closePath();
  const fg=ctx.createLinearGradient(0,-52*u,0,54*u);
  fg.addColorStop(0,'#f1f5f9'); fg.addColorStop(0.5,'#cbd5e1'); fg.addColorStop(1,'#94a3b8');
  ctx.fillStyle=fg; ctx.fill();
  ctx.strokeStyle='#475569'; ctx.lineWidth=0.8; ctx.stroke();

  // cockpit
  ctx.beginPath();
  ctx.ellipse(0,-34*u,4.5*u,8*u,0,0,Math.PI*2);
  ctx.fillStyle='rgba(56,189,248,0.45)'; ctx.fill();
  ctx.strokeStyle='#38bdf8'; ctx.lineWidth=0.8; ctx.stroke();

  // RIGHT wing (plane's right)
  ctx.beginPath();
  ctx.moveTo(8*u,-4*u);
  ctx.bezierCurveTo(24*u,-8*u,52*u,-3*u,60*u,3*u);
  ctx.bezierCurveTo(52*u,5*u,24*u,6*u,7*u,8*u);
  ctx.closePath();
  const rw=ctx.createLinearGradient(8*u,0,60*u,0);
  rw.addColorStop(0,'#fca5a5'); rw.addColorStop(1,'#dc2626');
  ctx.fillStyle=rw; ctx.fill();
  ctx.strokeStyle='#b91c1c'; ctx.lineWidth=0.8; ctx.stroke();
  // R wing tip
  ctx.beginPath(); ctx.arc(59*u,3*u,2.8*u,0,Math.PI*2);
  ctx.fillStyle='#f87171'; ctx.fill();

  // LEFT wing (plane's left)
  ctx.beginPath();
  ctx.moveTo(-8*u,-4*u);
  ctx.bezierCurveTo(-24*u,-8*u,-52*u,-3*u,-60*u,3*u);
  ctx.bezierCurveTo(-52*u,5*u,-24*u,6*u,-7*u,8*u);
  ctx.closePath();
  const lw=ctx.createLinearGradient(-8*u,0,-60*u,0);
  lw.addColorStop(0,'#93c5fd'); lw.addColorStop(1,'#1d4ed8');
  ctx.fillStyle=lw; ctx.fill();
  ctx.strokeStyle='#1e40af'; ctx.lineWidth=0.8; ctx.stroke();
  // L wing tip
  ctx.beginPath(); ctx.arc(-59*u,3*u,2.8*u,0,Math.PI*2);
  ctx.fillStyle='#60a5fa'; ctx.fill();

  // H-stab right
  ctx.beginPath();
  ctx.moveTo(6*u,36*u); ctx.lineTo(26*u,46*u); ctx.lineTo(24*u,51*u); ctx.lineTo(6*u,43*u);
  ctx.closePath(); ctx.fillStyle='#94a3b8'; ctx.fill(); ctx.strokeStyle='#64748b'; ctx.lineWidth=0.7; ctx.stroke();
  // H-stab left
  ctx.beginPath();
  ctx.moveTo(-6*u,36*u); ctx.lineTo(-26*u,46*u); ctx.lineTo(-24*u,51*u); ctx.lineTo(-6*u,43*u);
  ctx.closePath(); ctx.fillStyle='#94a3b8'; ctx.fill(); ctx.stroke();

  // engines
  [[26,2],[-26,2]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.ellipse(ex*u,ey*u,4.5*u,11*u,0,0,Math.PI*2);
    ctx.fillStyle='#1e293b'; ctx.fill(); ctx.strokeStyle='#475569'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(ex*u,(ey-3)*u,2.5*u,3.5*u,0,0,Math.PI*2);
    ctx.fillStyle='rgba(251,191,36,0.25)'; ctx.fill();
  });

  // nose arrow
  ctx.beginPath();
  ctx.moveTo(0,-57*u); ctx.lineTo(3.5*u,-49*u); ctx.lineTo(-3.5*u,-49*u);
  ctx.closePath(); ctx.fillStyle='#fbbf24'; ctx.fill();
}

// ── RENDER ──
function render() {
  const angles = getAngles();
  const topRow = document.getElementById('topRow');
  topRow.innerHTML = '';

  // START (big)
  topRow.appendChild(makeEndpoint(angles[0], 'START', 'start-ep', 120));

  // MIDDLE
  const mid = document.createElement('div');
  mid.className = 'steps-middle';

  if (steps.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '← กดปุ่ม + R หรือ + L เพื่อเพิ่ม step';
    mid.appendChild(hint);
  } else {
    // scroll row of mini planes + badges
    const scroll = document.createElement('div');
    scroll.className = 'steps-scroll';

    for (let i = 0; i < steps.length; i++) {
      // badge connector
      const conn = document.createElement('div');
      conn.className = 'conn';
      const badge = document.createElement('div');
      const isHl = highlighted === i;
      badge.className = `conn-badge ${steps[i].dir}${isHl?' hl':''}`;
      badge.textContent = `${steps[i].deg}${steps[i].dir}`;
      badge.onclick = (()=>{const idx=i; return ()=>{ highlighted=(highlighted===idx?null:idx); render(); };})();

      const del = document.createElement('button');
      del.className='del-btn'; del.textContent='✕';
      del.title='ลบ step นี้';
      del.onclick=(()=>{const idx=i; return (e)=>{ e.stopPropagation(); steps.splice(idx,1); if(highlighted>=steps.length)highlighted=null; render(); };})();

      badge.appendChild(del);
      conn.appendChild(badge);

      const arr = document.createElement('div');
      arr.className='conn-arrow'; arr.textContent='→';
      conn.appendChild(arr);
      scroll.appendChild(conn);

      // mini plane after step i
      const mini = document.createElement('div');
      mini.className='mini-item';
      const mwrap = document.createElement('div');
      mwrap.className=`mini-wrap${isHl?' hl':''}`;
      const cvs=document.createElement('canvas');
      cvs.width=50; cvs.height=50;
      mwrap.appendChild(cvs);
      const mlbl=document.createElement('div');
      mlbl.className='mini-lbl';
      const normI = ((angles[i+1]%360)+360)%360;
      mlbl.textContent = `${normI}°`;
      mini.appendChild(mwrap);
      mini.appendChild(mlbl);
      const ang=angles[i+1];
      mwrap.onclick=(()=>{const idx=i; return ()=>{ highlighted=(highlighted===idx?null:idx); render(); };})();
      setTimeout(()=>drawPlane(cvs,ang),0);
      scroll.appendChild(mini);
    }

    mid.appendChild(scroll);

    // info chips
    const infoBar = document.createElement('div');
    infoBar.className='info-bar';
    const final=angles[angles.length-1];
    const norm=((final%360)+360)%360;
    infoBar.innerHTML=`
      <div class="info-chip">Steps: <b>${steps.length}</b></div>
      <div class="info-chip">Net: <b>${final>0?'+':''}${final}°</b></div>
      <div class="info-chip">= <b>${norm}°</b></div>
      <div class="info-chip hi">→ <b>${orientLabel(norm)}</b></div>
    `;
    mid.appendChild(infoBar);
  }

  topRow.appendChild(mid);

  // RESULT (big) — always visible
  const finalAngle = angles[angles.length-1];
  topRow.appendChild(makeEndpoint(finalAngle, 'RESULT', 'result-ep', 120));
}

function makeEndpoint(rollDeg, labelText, cls, size) {
  const el=document.createElement('div');
  el.className='endpoint';
  const wrap=document.createElement('div');
  wrap.className=`ep-canvas-wrap ${cls}`;
  wrap.style.width=size+'px'; wrap.style.height=size+'px';
  const cvs=document.createElement('canvas');
  cvs.width=size; cvs.height=size;
  wrap.appendChild(cvs);
  const lbl=document.createElement('div');
  lbl.className=`ep-lbl ${cls}`;
  lbl.textContent=labelText;
  el.appendChild(wrap);
  el.appendChild(lbl);
  setTimeout(()=>drawPlane(cvs,rollDeg),0);
  return el;
}

function orientLabel(n) {
  if(n<5||n>355) return 'Level ▲';
  if(n>85&&n<95) return 'Right 90° ▶';
  if(n>175&&n<185) return 'Inverted ▼';
  if(n>265&&n<275) return 'Left 90° ◀';
  if(n<=90) return `R Bank ${n}°`;
  if(n<=180) return `R ${n}° (past 90)`;
  if(n<=270) return `L ${360-n}°`;
  return `L Bank ${360-n}°`;
}

// ── CONTROLS ──
function addStep(dir) {
  const deg=parseInt(document.getElementById('degIn').value)||90;
  steps.push({deg,dir}); highlighted=null; render();
}
function resetAll() {
  steps=[]; highlighted=null;
  if(animId)clearTimeout(animId); animId=null; render();
}
function loadPreset(arr) {
  steps=arr.map(a=>({deg:a[0],dir:a[1]})); highlighted=null; render();
}
function playAnim() {
  if(!steps.length)return;
  if(animId)clearTimeout(animId);
  highlighted=null; render();
  let i=0;
  function step(){
    highlighted=i; render(); i++;
    if(i<steps.length) animId=setTimeout(step,900);
    else animId=null;
  }
  animId=setTimeout(step,400);
}

render();
</script>
</body>
</html>
