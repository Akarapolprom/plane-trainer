<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Rotation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#f5f5f5; font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:32px 20px 48px; gap:24px;
  }
  h1 { font-size:20px; font-weight:600; color:#111; letter-spacing:-0.3px; }

  /* VIEWER */
  .viewer {
    display:flex; align-items:center; gap:20px;
    background:#fff; border-radius:20px; padding:28px 32px;
    width:100%; max-width:780px;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  .endpoint { display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; }
  .ep-box { border-radius:16px; border:2px solid #e0e0e0; background:#fafafa; overflow:hidden; }
  .ep-box.start { border-color:#aaa; }
  .ep-box.result { border-color:#111; box-shadow:0 0 0 3px rgba(0,0,0,0.07); }
  .ep-label { font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; }
  .ep-label.result { color:#111; }

  /* MIDDLE */
  .middle { flex:1; display:flex; flex-direction:column; align-items:center; gap:12px; min-width:0; }
  .steps-row { display:flex; align-items:center; overflow-x:auto; width:100%; padding-bottom:4px; }
  .steps-row::-webkit-scrollbar { height:3px; }
  .steps-row::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

  .step-block { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; padding:0 8px; }
  .step-arrow { font-size:18px; color:#ccc; flex-shrink:0; align-self:center; margin-bottom:28px; padding:0 2px; }

  .badge-wrap { position:relative; }
  .step-badge {
    font-size:14px; font-weight:700; padding:7px 16px;
    border-radius:10px; border:2px solid #ddd; background:#f5f5f5;
    color:#333; cursor:pointer; transition:all 0.15s; white-space:nowrap;
    display:block;
  }
  .step-badge:hover { border-color:#111; color:#111; background:#fff; }
  .step-badge.active { background:#111; color:#fff; border-color:#111; }
  .del-btn {
    position:absolute; top:-7px; right:-7px;
    width:18px; height:18px; border-radius:50%;
    background:#ccc; border:none; cursor:pointer;
    font-size:10px; color:#555; line-height:18px; text-align:center;
    display:none;
  }
  .badge-wrap:hover .del-btn { display:block; }
  .del-btn:hover { background:#111; color:#fff; }

  .mini-plane-wrap {
    width:58px; height:58px; border-radius:10px;
    background:#f5f5f5; border:1.5px solid #e0e0e0;
    overflow:hidden; cursor:pointer; transition:border-color 0.15s;
  }
  .mini-plane-wrap:hover { border-color:#999; }
  .mini-plane-wrap.active { border-color:#111; }
  .mini-lbl { font-size:10px; font-weight:500; color:#aaa; }

  .empty-hint { font-size:13px; color:#bbb; text-align:center; padding:12px 0; }

  /* INFO */
  .info-bar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .ic { font-size:12px; font-weight:500; padding:5px 12px; border-radius:8px; background:#f0f0f0; color:#666; }
  .ic b { color:#111; }
  .ic.hi { background:#111; color:#fff; }
  .ic.hi b { color:#fff; }

  /* CONTROLS */
  .controls {
    background:#fff; border-radius:20px; padding:24px 28px;
    width:100%; max-width:780px; box-shadow:0 1px 4px rgba(0,0,0,0.08);
    display:flex; flex-direction:column; gap:16px;
  }
  .ctrl-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .deg-input-wrap {
    display:flex; align-items:center; gap:4px;
    border:2px solid #e0e0e0; border-radius:12px; padding:8px 14px; background:#fafafa;
  }
  .deg-input-wrap:focus-within { border-color:#111; }
  .deg-input-wrap input {
    font-family:'Inter',sans-serif; font-size:22px; font-weight:700;
    width:72px; border:none; background:transparent; color:#111; outline:none;
  }
  .deg-input-wrap span { font-size:14px; color:#aaa; font-weight:500; }
  .btn {
    font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
    padding:12px 24px; border-radius:12px; border:2px solid; cursor:pointer;
    transition:all 0.15s;
  }
  .btn:active { transform:scale(0.96); }
  .btn-R { background:#fff; border-color:#111; color:#111; }
  .btn-R:hover { background:#111; color:#fff; }
  .btn-L { background:#fff; border-color:#555; color:#555; }
  .btn-L:hover { background:#555; color:#fff; }
  .btn-play { background:#111; border-color:#111; color:#fff; }
  .btn-play:hover { background:#333; }
  .btn-reset { background:#fff; border-color:#ddd; color:#aaa; font-size:13px; padding:10px 18px; }
  .btn-reset:hover { border-color:#999; color:#555; }
  .divider { width:100%; height:1px; background:#f0f0f0; }
  .preset-lbl { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#bbb; width:100%; margin-bottom:-4px; }
  .preset-row { display:flex; gap:8px; flex-wrap:wrap; }
  .pb {
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
    padding:8px 14px; border-radius:10px; border:1.5px solid #e0e0e0;
    background:#fafafa; color:#555; cursor:pointer; transition:all 0.15s;
  }
  .pb:hover { border-color:#111; color:#111; background:#fff; }
  .pb.qr { border-color:#ddd; color:#333; font-size:11px; padding:6px 11px; }
  .pb.qr:hover { border-color:#111; background:#111; color:#fff; }
  .pb.ql { border-color:#ddd; color:#666; font-size:11px; padding:6px 11px; }
  .pb.ql:hover { border-color:#555; background:#555; color:#fff; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    body { padding: 16px 12px 48px; gap: 16px; }
    h1 { font-size: 17px; }

    .viewer {
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      gap: 14px;
    }

    /* On mobile: START top, RESULT bottom, steps middle */
    .endpoint { flex-direction: row; gap: 12px; align-items: center; width: 100%; }
    .ep-box { flex-shrink: 0; }
    .ep-label { font-size: 12px; }

    /* Smaller big planes on mobile */
    .viewer .ep-box { width: 90px !important; height: 90px !important; }
    .viewer .ep-box canvas { width: 90px !important; height: 90px !important; }

    .middle { width: 100%; }
    .steps-row { gap: 0; }

    /* Controls */
    .controls { padding: 18px 16px; gap: 12px; }
    .ctrl-row { gap: 8px; }
    .deg-input-wrap input { font-size: 18px; width: 58px; }
    .btn { font-size: 13px; padding: 10px 16px; }
    .btn-reset { font-size: 11px; padding: 8px 12px; }
    .pb { font-size: 11px; padding: 7px 10px; }
    .pb.qr, .pb.ql { font-size: 11px; padding: 7px 9px; }

    .mini-plane-wrap { width: 50px; height: 50px; }
    .mini-plane-wrap canvas { width: 50px; height: 50px; }
    .step-badge { font-size: 12px; padding: 5px 11px; }
  }
</style>
</head>
<body>

<h1>Plane Roll Explorer</h1>

<div class="viewer" id="viewer"></div>

<div class="controls">
  <div class="ctrl-row">
    <div class="deg-input-wrap">
      <input id="degIn" type="number" value="90" min="1" max="720">
      <span>°</span>
    </div>
    <button class="btn btn-R" onclick="addStep('R')">Roll R</button>
    <button class="btn btn-L" onclick="addStep('L')">Roll L</button>
    <button class="btn btn-play" onclick="playAnim()">▶ Play</button>
    <button class="btn btn-reset" onclick="resetAll()">Reset</button>
  </div>
  <div class="divider"></div>
  <div class="preset-row">
    <div class="preset-lbl">Quick add</div>
    <button class="pb qr" onclick="addFixed(45,'R')">R45</button>
    <button class="pb qr" onclick="addFixed(90,'R')">R90</button>
    <button class="pb qr" onclick="addFixed(135,'R')">R135</button>
    <button class="pb qr" onclick="addFixed(180,'R')">R180</button>
    <button class="pb qr" onclick="addFixed(270,'R')">R270</button>
    <button class="pb qr" onclick="addFixed(360,'R')">R360</button>
    <button class="pb ql" onclick="addFixed(45,'L')">L45</button>
    <button class="pb ql" onclick="addFixed(90,'L')">L90</button>
    <button class="pb ql" onclick="addFixed(135,'L')">L135</button>
    <button class="pb ql" onclick="addFixed(180,'L')">L180</button>
    <button class="pb ql" onclick="addFixed(270,'L')">L270</button>
    <button class="pb ql" onclick="addFixed(360,'L')">L360</button>
  </div>
  <div class="divider"></div>
  <div class="preset-row">
    <div class="preset-lbl">Presets</div>
    <button class="pb" onclick="load([[585,'R'],[360,'L'],[675,'R'],[315,'R'],[720,'R']])">585R 360L 675R 315R 720R</button>
    <button class="pb" onclick="load([[90,'R'],[90,'R'],[90,'R'],[90,'R']])">90R × 4</button>
    <button class="pb" onclick="load([[180,'R'],[360,'L'],[270,'R']])">180R 360L 270R</button>
    <button class="pb" onclick="load([[45,'R'],[45,'R'],[90,'L']])">45R 45R 90L</button>
    <button class="pb" onclick="load([[270,'L'],[90,'R'],[180,'L'],[360,'R']])">270L 90R 180L 360R</button>
  </div>
</div>

<script>
var steps = [];
var hl = null;
var animId = null;

function getAngles() {
  var a = [0];
  for (var i = 0; i < steps.length; i++) {
    a.push(a[a.length-1] + (steps[i].dir === 'R' ? steps[i].deg : -steps[i].deg));
  }
  return a;
}

function draw(canvas, roll) {
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W/2, cy = H/2;
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(roll * Math.PI / 180);
  var u = W / 130;

  // fuselage
  ctx.beginPath();
  ctx.moveTo(0,-50*u);
  ctx.bezierCurveTo(6*u,-44*u,8*u,-30*u,8*u,-14*u);
  ctx.lineTo(7*u,16*u);
  ctx.bezierCurveTo(7*u,38*u,3*u,50*u,0,54*u);
  ctx.bezierCurveTo(-3*u,50*u,-7*u,38*u,-7*u,16*u);
  ctx.lineTo(-8*u,-14*u);
  ctx.bezierCurveTo(-8*u,-30*u,-6*u,-44*u,0,-50*u);
  ctx.closePath();
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1.4*u; ctx.stroke();

  // cockpit
  ctx.beginPath();
  ctx.ellipse(0,-30*u,4*u,7*u,0,0,Math.PI*2);
  ctx.fillStyle='#ddd'; ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=0.8*u; ctx.stroke();

  // right wing
  ctx.beginPath();
  ctx.moveTo(8*u,-2*u);
  ctx.bezierCurveTo(22*u,-6*u,50*u,-2*u,58*u,4*u);
  ctx.bezierCurveTo(50*u,6*u,22*u,7*u,7*u,9*u);
  ctx.closePath();
  ctx.fillStyle='#ddd'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1*u; ctx.stroke();

  // left wing
  ctx.beginPath();
  ctx.moveTo(-8*u,-2*u);
  ctx.bezierCurveTo(-22*u,-6*u,-50*u,-2*u,-58*u,4*u);
  ctx.bezierCurveTo(-50*u,6*u,-22*u,7*u,-7*u,9*u);
  ctx.closePath();
  ctx.fillStyle='#ddd'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1*u; ctx.stroke();

  // h-stab right
  ctx.beginPath();
  ctx.moveTo(6*u,34*u); ctx.lineTo(24*u,44*u); ctx.lineTo(22*u,49*u); ctx.lineTo(6*u,40*u);
  ctx.closePath(); ctx.fillStyle='#ccc'; ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=0.8*u; ctx.stroke();

  // h-stab left
  ctx.beginPath();
  ctx.moveTo(-6*u,34*u); ctx.lineTo(-24*u,44*u); ctx.lineTo(-22*u,49*u); ctx.lineTo(-6*u,40*u);
  ctx.closePath(); ctx.fillStyle='#ccc'; ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=0.8*u; ctx.stroke();

  // engines
  var engs = [[24,4],[-24,4]];
  for (var e = 0; e < engs.length; e++) {
    ctx.beginPath();
    ctx.ellipse(engs[e][0]*u,engs[e][1]*u,4*u,10*u,0,0,Math.PI*2);
    ctx.fillStyle='#555'; ctx.fill();
    ctx.strokeStyle='#333'; ctx.lineWidth=0.8*u; ctx.stroke();
  }

  // nose arrow
  ctx.beginPath();
  ctx.moveTo(0,-55*u); ctx.lineTo(3.5*u,-47*u); ctx.lineTo(-3.5*u,-47*u);
  ctx.closePath(); ctx.fillStyle='#111'; ctx.fill();

  ctx.restore();
}

function makeEndpoint(roll, label, cls, size) {
  var el = document.createElement('div');
  el.className = 'endpoint';
  var box = document.createElement('div');
  box.className = 'ep-box ' + cls;
  box.style.width = size+'px'; box.style.height = size+'px';
  var cvs = document.createElement('canvas');
  cvs.width = size; cvs.height = size;
  box.appendChild(cvs);
  var lbl = document.createElement('div');
  lbl.className = 'ep-label ' + cls;
  lbl.textContent = label;
  el.appendChild(box);
  el.appendChild(lbl);
  draw(cvs, roll);
  return el;
}

function deleteStep(idx) {
  steps.splice(idx, 1);
  if (hl !== null && hl >= steps.length) hl = null;
  render();
}

function toggleHl(idx) {
  hl = (hl === idx) ? null : idx;
  render();
}

function render() {
  var viewer = document.getElementById('viewer');
  viewer.innerHTML = '';
  var angles = getAngles();
  var BIG = window.innerWidth <= 600 ? 90 : 140;

  viewer.appendChild(makeEndpoint(angles[0], 'START', 'start', BIG));

  var mid = document.createElement('div');
  mid.className = 'middle';

  if (steps.length === 0) {
    var hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = 'กด Roll R หรือ Roll L เพื่อเพิ่ม step';
    mid.appendChild(hint);
  } else {
    var row = document.createElement('div');
    row.className = 'steps-row';

    for (var i = 0; i < steps.length; i++) {
      (function(idx) {
        var isHl = (hl === idx);

        // arrow
        var arr = document.createElement('div');
        arr.className = 'step-arrow';
        arr.textContent = '›';
        row.appendChild(arr);

        // block
        var blk = document.createElement('div');
        blk.className = 'step-block';

        // badge wrapper
        var bwrap = document.createElement('div');
        bwrap.className = 'badge-wrap';

        var badge = document.createElement('div');
        badge.className = 'step-badge' + (isHl ? ' active' : '');
        badge.textContent = steps[idx].deg + steps[idx].dir;
        badge.onclick = function() { toggleHl(idx); };

        var del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '×';
        del.onclick = function(e) { e.stopPropagation(); deleteStep(idx); };

        bwrap.appendChild(badge);
        bwrap.appendChild(del);

        // mini plane
        var mwrap = document.createElement('div');
        mwrap.className = 'mini-plane-wrap' + (isHl ? ' active' : '');
        mwrap.onclick = function() { toggleHl(idx); };
        var cvs = document.createElement('canvas');
        cvs.width = 58; cvs.height = 58;
        mwrap.appendChild(cvs);
        draw(cvs, angles[idx+1]);

        var norm = ((angles[idx+1] % 360) + 360) % 360;
        var mlbl = document.createElement('div');
        mlbl.className = 'mini-lbl';
        mlbl.textContent = norm + '°';

        blk.appendChild(bwrap);
        blk.appendChild(mwrap);
        blk.appendChild(mlbl);
        row.appendChild(blk);
      })(i);
    }
    mid.appendChild(row);

    var final = angles[angles.length-1];
    var norm = ((final % 360) + 360) % 360;
    var info = document.createElement('div');
    info.className = 'info-bar';
    info.innerHTML =
      '<div class="ic">Net <b>' + (final>0?'+':'') + final + '°</b></div>' +
      '<div class="ic">= <b>' + norm + '°</b></div>' +
      '<div class="ic hi"><b>' + orientLabel(norm) + '</b></div>';
    mid.appendChild(info);
  }

  viewer.appendChild(mid);

  // RESULT — during play show current angle, otherwise final
  var resultAngle = (hl !== null) ? angles[hl+1] : angles[angles.length-1];
  viewer.appendChild(makeEndpoint(resultAngle, 'RESULT', 'result', BIG));

  // scroll active step into view during play
  if (hl !== null) {
    requestAnimationFrame(function() {
      var row = document.querySelector('.steps-row');
      if (!row) return;
      var blocks = row.querySelectorAll('.step-block');
      if (!blocks[hl]) return;
      var block = blocks[hl];
      var rowLeft = row.getBoundingClientRect().left;
      var blockLeft = block.getBoundingClientRect().left;
      var blockCenter = blockLeft + block.offsetWidth/2;
      var rowCenter = rowLeft + row.offsetWidth/2;
      var target = row.scrollLeft + (blockCenter - rowCenter);
      smoothScroll(row, target, 300);
    });
  }
}

function orientLabel(n) {
  if (n<5||n>355) return 'Level';
  if (n>85&&n<95) return 'Right 90°';
  if (n>175&&n<185) return 'Inverted';
  if (n>265&&n<275) return 'Left 90°';
  if (n<=90) return 'R '+n+'°';
  if (n<=180) return 'R '+n+'°';
  if (n<=270) return 'L '+(360-n)+'°';
  return 'L '+(360-n)+'°';
}

function addStep(dir) {
  var deg = parseInt(document.getElementById('degIn').value) || 90;
  steps.push({deg:deg, dir:dir});
  hl = null;
  render();
}

function resetAll() {
  steps = []; hl = null;
  if (animId) clearTimeout(animId);
  animId = null;
  render();
}

function load(arr) {
  steps = arr.map(function(a){ return {deg:a[0], dir:a[1]}; });
  hl = null;
  render();
}

function playAnim() {
  if (!steps.length) return;
  if (animId) clearTimeout(animId);
  hl = null;
  render();
  var i = 0;
  function next() {
    hl = i;
    render();
    i++;
    if (i < steps.length) animId = setTimeout(next, 900);
    else animId = null;
  }
  animId = setTimeout(next, 400);
}

function smoothScroll(el, target, duration) {
  var start = el.scrollLeft;
  var dist = target - start;
  var startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var ease = progress < 0.5 ? 2*progress*progress : -1+(4-2*progress)*progress;
    el.scrollLeft = start + dist * ease;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function addFixed(deg, dir) {
  steps.push({deg:deg, dir:dir});
  hl = null;
  render();
}

render();
</script>
</body>
</html>
